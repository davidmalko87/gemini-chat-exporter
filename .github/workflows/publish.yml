name: Publish to PyPI

# Publishes the Python toolkit to PyPI when a GitHub Release is published.
# Uses PyPI Trusted Publishing (OIDC) - no API token stored in the repo.
# This workflow is intentionally dormant until you cut a release tag (vX.Y.Z).

on:
  release:
    types: [published]

jobs:
  build-and-publish:
    name: Build and publish
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # required for trusted publishing
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
